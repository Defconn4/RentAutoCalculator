version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      # Install dependencies into the current directory
      - pip install -r requirements.txt -t .
  build:
    commands:
      # Create a ZIP file that will be your Lambda deployment package.
      - zip -r deployment-package.zip . -x "*__pycache__*"
artifacts:
  files:
    - deployment-package.zip
